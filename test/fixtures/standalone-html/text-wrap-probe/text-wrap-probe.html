s keyboard navigation: several commands require the mouse even when the cursor is already in a known region of the canvas. Suggestions include adding a command palette shortcut and surfacing the current selection count somewhere persistent. Willing to pair on a follow-up.</p>\n<p class=\"para\"><strong class=\"label\">Participant C</strong> – reported that the weekly summary email reached them on Tuesday morning rather than Monday afternoon as documented. On investigation this was traced to a timezone fallback when the user profile lacks a saved region. They also asked whether the summary could include a compact view that fits a single screen without horizontal scroll on a tablet in portrait orientation.</p>\n<p class=\"para\"><strong class=\"label\">Participant D</strong> – uses the mobile app almost exclusively and surfaced a visual glitch where the top navigation bar occasionally disappears after scrolling quickly through a long document. This appears to be related to the bounce animation on iOS and has been reproduced on two recent devices. They have offered to record screen captures for the bug tracker if that would speed up the investigation.</p></div>\n    <div class=\"col\"><p class=\"para\"><strong class=\"label\">Participant E</strong> – works primarily from a desktop with a very wide monitor and flagged that some dialog boxes open at the far edge of the screen rather than centered on the active window. This is a minor annoyance but repeats every session. They also noted that the zoom controls in the settings panel do not persist across restarts, which makes it harder to restore their preferred working magnification each day.</p>\n<p class=\"para\"><strong class=\"label\">Participant F</strong> – spent most of the evaluation time with the collaboration features and had generally positive things to say about presence indicators. One gap: when a teammate joins mid-session the list of active participants does not update until the next refresh. They would like to see a short animation or sound cue when a new collaborator joins, particularly in review sessions with four or more attendees.</p>\n<p class=\"para\"><strong class=\"label\">Participant G</strong> – is new to the product and spent several hours learning the interface before giving structured feedback. They found the documentation thorough but suggested that the getting-started page could link directly to a short video walkthrough rather than asking the reader to scroll through dense text. They also asked about import support for legacy formats that their team still maintains for archival reasons.</p>\n<p class=\"para\"><strong class=\"label\">Participant H</strong> – reported a crash that occurred only when pasting a long block of text from a source document into a newly created page. The crash is not deterministic but reproduces roughly once in every three or four attempts with the same input. They sent a sanitized copy of the source so engineers can look into whether a particular character sequence triggers the failing code path reliably.</p></div>\n  </div>\n  <div class=\"footer\"><span>text-wrap probe fixture</span><span class=\"page\">1</span></div>\n</section>\n<section data-label=\"02 Inter 16\" style=\"font-size:16px;line-height:1.55;\">\n  <h1 class=\"title\">Text-wrap probe — Inter 16px</h1>\n  <div class=\"stack\">\n    <div class=\"col\"><p class=\"para\"><strong class=\"label\">Participant A</strong> – joined the initial cohort in late March and has been testing the onboarding flow across several devices. Their feedback focused on the clarity of permission prompts and how quickly the first screen loads when the network is slow. Notes mention a preference for fewer tooltips on the home view and a concern that the default sort order may hide recent activity from returning users. Overall tone is constructive.</p>\n<p class=\"para\"><strong class=\"label\">Participant B</strong> – has a background in product design and spent the first week documenting <script>
  (function () {
    var tpl = document.querySelector('script[type="__bundler/template"]').textContent;
    var html = JSON.parse(tpl);
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var mount = document.getElementById('mount');
    for (var i = 0; i < doc.body.children.length; i++) {
      mount.appendChild(document.importNode(doc.body.children[i], true));
    }
    // Inject the template's <style> blocks into the live document head so
    // computed styles resolve when the converter reads the page.
    var styles = doc.head.querySelectorAll('style, link[rel="stylesheet"]');
    for (var j = 0; j < styles.length; j++) {
      document.head.appendChild(document.importNode(styles[j], true));
    }
  })();
</script>
