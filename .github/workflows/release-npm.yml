name: Release npm

on:
  push:
    tags:
      - 'npm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build .mcpb bundle
        run: node scripts/pack.mjs

      - name: Check if version already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view openfig-cli@"$PKG_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION already published — skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openfig.mcpb
          name: OpenFig ${{ github.ref_name }}
          body: |
            ## npm package release

            ```bash
            npm install -g openfig-cli
            ```

            ## Claude Cowork / Desktop (MCP bundle)

            Download `openfig.mcpb` and install via Claude Desktop → Settings → Extensions → Upload local plugin.
