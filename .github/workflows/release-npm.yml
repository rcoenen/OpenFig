name: Release npm

on:
  push:
    tags:
      - 'npm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view openfig-cli@"$PKG_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION already published — skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Strip the `npm-v` prefix to get the bare version (e.g. 0.4.3)
          VERSION="${GITHUB_REF_NAME#npm-v}"
          # Pull the body of `## [VERSION]` up to (but not including) the
          # next `## [` heading. Empty string if the section is missing,
          # in which case the release falls through to just the install
          # snippet — never fails the publish.
          NOTES=""
          if [ -f CHANGELOG.md ] && [ -f scripts/extract-changelog-section.mjs ]; then
            NOTES=$(node scripts/extract-changelog-section.mjs "$VERSION" || true)
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.notes.outputs.notes }}

            ```bash
            npm install -g openfig-cli
            ```
