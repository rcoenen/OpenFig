name: Release Claude plugin

on:
  push:
    tags:
      - 'claudeplugin-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Plugin ${{ github.ref_name }}
          body: |
            ## Claude Cowork plugin release

            Install via Claude Cowork → Customize → Browse plugins → add marketplace `rcoenen/OpenFig`.

            Or sync an existing installation to pick up the latest skills and configuration.
