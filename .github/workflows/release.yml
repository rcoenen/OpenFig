name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin ZIP
        run: node scripts/pack.mjs

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openfig.mcpb
          name: OpenFig ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            npm install -g openfig-cli
            ```

            ## MCP / Claude Desktop

            **Option A — Marketplace (recommended):**
            ```bash
            claude plugin marketplace add rcoenen/OpenFig
            claude plugin install openfig
            ```

            **Option B — Local upload:**
            1. Download `openfig.mcpb` below
            2. Claude Desktop → Settings → Extensions → Upload local plugin
